<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面已迁移 - 小戴的网络日志</title>

  <!-- 真正的 HTTP 301 等价物：canonical 告诉搜索引擎"权威页面是下面那个" -->
  <link rel="canonical" href="https://www.daishengli.top/2026/05/27/stop-slop-ai-writing/">

  <!-- 0 秒跳转（用户感知 = 立刻跳转） -->
  <meta http-equiv="refresh" content="0; url=https://www.daishengli.top/2026/05/27/stop-slop-ai-writing/">

  <!-- 兜底：JS 跳转，避免某些爬虫不读 meta -->
  <script>
    window.location.replace("https://www.daishengli.top/2026/05/27/stop-slop-ai-writing/");
  </script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #0a0e14;
      color: #9ba3b3;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .box {
      max-width: 480px;
      padding: 40px;
    }
    h1 {
      color: #e6e6e6;
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 16px;
    }
    p {
      font-size: 14px;
      line-height: 1.7;
      margin: 12px 0;
    }
    a {
      color: #00d4ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #1a2030;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>页面已合并到新地址</h1>
    <p>
      <span class="spinner"></span>正在跳转到新页面…
    </p>
    <p>
      如果没有自动跳转，请点击：<br>
      <a href="https://www.daishengli.top/2026/05/27/stop-slop-ai-writing/">《去除 AI 腔调：stop-slop 让机器写作更像人》</a>
    </p>
  </div>
</body>
</html>
