<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, monospace">
  <defs>
    <!-- 背景：暗色 + 栅格 -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e14"/>
      <stop offset="1" stop-color="#11161f"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2030" stroke-width="1"/>
    </pattern>
    <!-- 雷达扫描光 -->
    <radialGradient id="scan" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00ff8830"/>
      <stop offset="1" stop-color="#00ff8800"/>
    </radialGradient>
    <!-- 警戒红光 -->
    <radialGradient id="alert" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ff2d5d40"/>
      <stop offset="1" stop-color="#ff2d5d00"/>
    </radialGradient>
  </defs>

  <!-- 背景层 -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#grid)" opacity="0.6"/>

  <!-- 顶部状态栏 -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="1120" height="50" fill="#0d131c" stroke="#1a2030" stroke-width="1"/>
    <circle cx="22" cy="25" r="6" fill="#ff2d5d">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="30" fill="#ff2d5d" font-size="14" font-weight="700" letter-spacing="2">SECURITY.ALERT</text>
    <text x="200" y="30" fill="#5a6678" font-size="12">// VIBE_CODING_THREAT_VECTOR_ANALYSIS</text>
    <text x="900" y="30" fill="#00ff88" font-size="12" letter-spacing="1">[ SCANNING... ]</text>
    <text x="1080" y="30" fill="#5a6678" font-size="12">v1.0</text>
  </g>

  <!-- 主标题 -->
  <g transform="translate(40, 130)">
    <text x="0" y="0" fill="#e6e6e6" font-size="36" font-weight="800" letter-spacing="-1">VIBE CODING vs PRO SECURITY</text>
    <text x="0" y="32" fill="#5a6678" font-size="14">// 当 AI 一小时写出 App，黑客一小时就能攻破</text>
    <line x1="0" y1="50" x2="1120" y2="50" stroke="#1a2030" stroke-width="1"/>
  </g>

  <!-- 雷达图 -->
  <g transform="translate(370, 480)">
    <!-- 背景光晕 -->
    <circle r="200" fill="url(#scan)" opacity="0.5"/>
    <circle r="200" fill="url(#alert)" opacity="0.3"/>

    <!-- 雷达层级（六边形） -->
    <g fill="none" stroke="#1f2937" stroke-width="1">
      <polygon points="0,-200 173,-100 173,100 0,200 -173,100 -173,-100"/>
      <polygon points="0,-150 130,-75 130,75 0,150 -130,75 -130,-75" opacity="0.6"/>
      <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" opacity="0.4"/>
      <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25" opacity="0.3"/>
    </g>

    <!-- 轴线 -->
    <g stroke="#1f2937" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-200"/>
      <line x1="0" y1="0" x2="173" y2="-100"/>
      <line x1="0" y1="0" x2="173" y2="100"/>
      <line x1="0" y1="0" x2="0" y2="200"/>
      <line x1="0" y1="0" x2="-173" y2="100"/>
      <line x1="0" y1="0" x2="-173" y2="-100"/>
    </g>

    <!-- "Vibe Coding" 多边形（红色，弱） -->
    <polygon points="0,-90 90,-50 130,75 0,180 -160,90 -100,-60"
             fill="#ff2d5d22" stroke="#ff2d5d" stroke-width="2" stroke-dasharray="4 4"/>

    <!-- "Pro Security" 多边形（绿色，强） -->
    <polygon points="0,-185 160,-92 160,92 0,185 -160,92 -160,-92"
             fill="#00ff8820" stroke="#00ff88" stroke-width="2.5"/>

    <!-- 顶点数据点（vibe coding） -->
    <g fill="#ff2d5d">
      <circle cx="0" cy="-90" r="4"/>
      <circle cx="90" cy="-50" r="4"/>
      <circle cx="130" cy="75" r="4"/>
      <circle cx="0" cy="180" r="4"/>
      <circle cx="-160" cy="90" r="4"/>
      <circle cx="-100" cy="-60" r="4"/>
    </g>

    <!-- 顶点数据点（pro） -->
    <g fill="#00ff88">
      <circle cx="0" cy="-185" r="5"/>
      <circle cx="160" cy="-92" r="5"/>
      <circle cx="160" cy="92" r="5"/>
      <circle cx="0" cy="185" r="5"/>
      <circle cx="-160" cy="92" r="5"/>
      <circle cx="-160" cy="-92" r="5"/>
    </g>

    <!-- 标签 -->
    <g fill="#9ba3b3" font-size="13" font-weight="600">
      <text x="0" y="-218" text-anchor="middle">短信防刷</text>
      <text x="0" y="-202" text-anchor="middle" fill="#ff2d5d" font-size="11">45%</text>
      <text x="195" y="-100" text-anchor="start">UGC 审核</text>
      <text x="195" y="-84" text-anchor="start" fill="#ff2d5d" font-size="11">30%</text>
      <text x="195" y="100" text-anchor="start">图床防盗</text>
      <text x="195" y="116" text-anchor="start" fill="#ff2d5d" font-size="11">20%</text>
      <text x="0" y="232" text-anchor="middle">登录鉴权</text>
      <text x="0" y="248" text-anchor="middle" fill="#ff2d5d" font-size="11">10%</text>
      <text x="-195" y="100" text-anchor="end">AI prompt</text>
      <text x="-195" y="116" text-anchor="end" fill="#ff2d5d" font-size="11">15%</text>
      <text x="-195" y="-100" text-anchor="end">依赖扫描</text>
      <text x="-195" y="-84" text-anchor="end" fill="#ff2d5d" font-size="11">40%</text>
    </g>

    <!-- 中心点 -->
    <circle r="3" fill="#e6e6e6"/>
    <text x="12" y="-5" fill="#5a6678" font-size="10">0%</text>
    <text x="12" y="195" fill="#5a6678" font-size="10">100%</text>
  </g>

  <!-- 右侧数据卡 -->
  <g transform="translate(800, 200)">
    <!-- 数据卡 1 -->
    <g transform="translate(0, 0)">
      <rect width="360" height="120" fill="#0d131c" stroke="#1a2030"/>
      <rect width="4" height="120" fill="#ff2d5d"/>
      <text x="20" y="32" fill="#5a6678" font-size="11" letter-spacing="2">CRITICAL · Veracode 2025</text>
      <text x="20" y="68" fill="#ff2d5d" font-size="40" font-weight="800">2.74×</text>
      <text x="20" y="92" fill="#9ba3b3" font-size="12">AI 代码漏洞是人写的</text>
      <text x="20" y="108" fill="#9ba3b3" font-size="12">2.74 倍</text>
    </g>

    <!-- 数据卡 2 -->
    <g transform="translate(0, 140)">
      <rect width="360" height="120" fill="#0d131c" stroke="#1a2030"/>
      <rect width="4" height="120" fill="#ffb800"/>
      <text x="20" y="32" fill="#5a6678" font-size="11" letter-spacing="2">WARNING · AppSec 2026</text>
      <text x="20" y="68" fill="#ffb800" font-size="40" font-weight="800">25.7%</text>
      <text x="20" y="92" fill="#9ba3b3" font-size="12">AI 代码含可被利用漏洞</text>
      <text x="20" y="108" fill="#9ba3b3" font-size="12">仅 75% 开发者认为更安全</text>
    </g>

    <!-- 数据卡 3 -->
    <g transform="translate(0, 280)">
      <rect width="360" height="120" fill="#0d131c" stroke="#1a2030"/>
      <rect width="4" height="120" fill="#00ff88"/>
      <text x="20" y="32" fill="#5a6678" font-size="11" letter-spacing="2">FIX · OWASP LLM Top 10</text>
      <text x="20" y="68" fill="#00ff88" font-size="36" font-weight="800">PROMPT INJECTION</text>
      <text x="20" y="92" fill="#9ba3b3" font-size="12">LLM 应用的头号威胁</text>
      <text x="20" y="108" fill="#9ba3b3" font-size="12">"我是管理员"就能骗出来</text>
    </g>
  </g>

  <!-- 底部 4 大盲区 -->
  <g transform="translate(40, 720)">
    <text x="0" y="0" fill="#5a6678" font-size="12" letter-spacing="2">// AI ENCODING · 4 SECURITY BLIND SPOTS</text>
    <g transform="translate(0, 20)">
      <g transform="translate(0, 0)">
        <rect width="265" height="48" fill="#0d131c" stroke="#1a2030"/>
        <text x="14" y="20" fill="#ff2d5d" font-size="11" letter-spacing="1">[01] 功能跑通</text>
        <text x="14" y="38" fill="#9ba3b3" font-size="11">默认按"能跑"交付</text>
      </g>
      <g transform="translate(285, 0)">
        <rect width="265" height="48" fill="#0d131c" stroke="#1a2030"/>
        <text x="14" y="20" fill="#ff2d5d" font-size="11" letter-spacing="1">[02] 业务安全</text>
        <text x="14" y="38" fill="#9ba3b3" font-size="11">不懂内容风控/合规</text>
      </g>
      <g transform="translate(570, 0)">
        <rect width="265" height="48" fill="#0d131c" stroke="#1a2030"/>
        <text x="14" y="20" fill="#ff2d5d" font-size="11" letter-spacing="1">[03] Prompt 攻击</text>
        <text x="14" y="38" fill="#9ba3b3" font-size="11">指令本身是攻击面</text>
      </g>
      <g transform="translate(855, 0)">
        <rect width="265" height="48" fill="#0d131c" stroke="#1a2030"/>
        <text x="14" y="20" fill="#ff2d5d" font-size="11" letter-spacing="1">[04] 肌肉萎缩</text>
        <text x="14" y="38" fill="#9ba3b3" font-size="11">一代开发者的安全直觉</text>
      </g>
    </g>
  </g>
</svg>
